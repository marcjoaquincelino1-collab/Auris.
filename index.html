<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auris AI</title>
<style>
body{
    margin:0;
    height:200vh;
    background:#0f172a;
    font-family:Arial,sans-serif;
}

/* AI Orb */
#auris{
    position:fixed;
    width:70px;
    height:70px;
    border-radius:50%;
    background:radial-gradient(circle,#60a5fa,#1e3a8a);
    box-shadow:0 0 20px #60a5fa,0 0 40px #1e40af;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    z-index:9999;
    transform:translate(-50%, -50%);
    transition: transform 0.1s linear;
}

/* Pulse inside */
#auris::after{
    content:"";
    width:30px;
    height:30px;
    border-radius:50%;
    background:white;
    opacity:0.7;
    animation:pulse 2s infinite;
}
@keyframes pulse{
    0%{transform:scale(0.6);opacity:0.7}
    50%{transform:scale(1);opacity:1}
    100%{transform:scale(0.6);opacity:0.7}
}
</style>
</head>
<body>

<div id="auris"></div>

<script>
const auris = document.getElementById("auris");

let orbX = window.innerWidth/2;
let orbY = window.innerHeight/2;

let mouseX = orbX;
let mouseY = orbY;

auris.style.left = orbX + "px";
auris.style.top = orbY + "px";

/* Follow cursor/finger */
document.addEventListener("mousemove",(e)=>{
    mouseX = e.clientX;
    mouseY = e.clientY;
});
document.addEventListener("touchmove",(e)=>{
    mouseX = e.touches[0].clientX;
    mouseY = e.touches[0].clientY;
});

/* Animation loop */
function animateOrb(){
    // Distance to cursor
    const dx = mouseX - orbX;
    const dy = mouseY - orbY;
    const distance = Math.sqrt(dx*dx + dy*dy);

    // Stop if too close (50px)
    if(distance > 50){
        orbX += dx * 0.08;
        orbY += dy * 0.08;
    }

    auris.style.left = orbX + "px";
    auris.style.top = orbY + "px";

    requestAnimationFrame(animateOrb);
}
animateOrb();

/* Click interaction */
auris.addEventListener("click", ()=>{
    alert("Hello! I am Auris, your AI assistant. ✨");
});
</script>

</body>
</html>
