<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auris AI Assistant</title>
<style>
body{
    margin:0;
    height:200vh;
    background:#0f172a;
    font-family:Arial,sans-serif;
    overflow-x:hidden;
}

/* Orb */
#auris{
    position:fixed;
    width:70px;
    height:70px;
    border-radius:50%;
    background:radial-gradient(circle,#60a5fa,#1e3a8a);
    box-shadow:0 0 20px #60a5fa,0 0 40px #1e40af;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    z-index:9999;
    transform:translate(-50%, -50%);
    transition: transform 0.1s linear;
}
#auris::after{
    content:"";
    width:30px;
    height:30px;
    border-radius:50%;
    background:white;
    opacity:0.7;
    animation:pulse 2s infinite;
}
@keyframes pulse{
    0%{transform:scale(0.6);opacity:0.7}
    50%{transform:scale(1);opacity:1}
    100%{transform:scale(0.6);opacity:0.7}
}

/* Chat Panel */
#chat-panel{
    position:fixed;
    bottom:100px;
    right:20px;
    width:300px;
    max-width:90%;
    background:#112240;
    border-radius:10px;
    box-shadow:0 0 20px #0ea5e9;
    display:none;
    flex-direction:column;
    overflow:hidden;
    z-index:9998;
}

#chat-header{
    background:#0a192f;
    color:white;
    padding:10px;
    font-weight:bold;
    text-align:center;
}

#chat-messages{
    padding:10px;
    height:200px;
    overflow-y:auto;
    color:white;
    font-size:14px;
}

.bubble{
    background:#1f4068;
    padding:8px 12px;
    border-radius:15px;
    margin-bottom:8px;
    animation:fadeIn 0.4s ease-in-out;
}

.user-bubble{
    background:#2e86de;
}

@keyframes fadeIn{
    from{opacity:0;transform:translateY(5px);}
    to{opacity:1;transform:translateY(0);}
}

/* Input area */
#chat-input-area{
    display:flex;
    border-top:1px solid #0a192f;
}

#chat-input{
    flex:1;
    padding:10px;
    border:none;
    outline:none;
    font-size:14px;
    background:#112240;
    color:white;
}

#send-btn, #report-btn{
    padding:10px;
    border:none;
    cursor:pointer;
    background:#0ea5e9;
    color:black;
}
#report-btn{
    background:#f87171;
}
</style>
</head>
<body>

<div id="auris"></div>

<div id="chat-panel">
    <div id="chat-header">Auris AI</div>
    <div id="chat-messages">
        <div class="bubble">Hello! I am Auris ✨ How can I assist you?</div>
    </div>
    <div id="chat-input-area">
        <input type="text" id="chat-input" placeholder="Type your message...">
        <button id="send-btn">Send</button>
        <button id="report-btn">Report</button>
    </div>
</div>

<script>
const auris = document.getElementById("auris");
const chatPanel = document.getElementById("chat-panel");
const messages = document.getElementById("chat-messages");
const input = document.getElementById("chat-input");
const sendBtn = document.getElementById("send-btn");
const reportBtn = document.getElementById("report-btn");

/* Orb follow */
let orbX = window.innerWidth/2;
let orbY = window.innerHeight/2;
let mouseX = orbX;
let mouseY = orbY;
auris.style.left = orbX + "px";
auris.style.top = orbY + "px";

document.addEventListener("mousemove",(e)=>{ mouseX=e.clientX; mouseY=e.clientY; });
document.addEventListener("touchmove",(e)=>{ mouseX=e.touches[0].clientX; mouseY=e.touches[0].clientY; });

function animateOrb(){
    const dx = mouseX - orbX;
    const dy = mouseY - orbY;
    const distance = Math.sqrt(dx*dx + dy*dy);
    if(distance > 50){ orbX += dx*0.08; orbY += dy*0.08; }
    auris.style.left = orbX + "px";
    auris.style.top = orbY + "px";
    requestAnimationFrame(animateOrb);
}
animateOrb();

/* Click to toggle panel */
auris.addEventListener("click", ()=>{
    chatPanel.style.display = chatPanel.style.display === "flex" ? "none" : "flex";
    chatPanel.style.flexDirection = "column";
});

/* Send message */
function sendMessage(){
    const msg = input.value.trim();
    if(!msg) return;
    const userBubble = document.createElement("div");
    userBubble.className="bubble user-bubble";
    userBubble.innerText=msg;
    messages.appendChild(userBubble);
    messages.scrollTop = messages.scrollHeight;
    input.value="";
    setTimeout(()=>{
        const aiBubble = document.createElement("div");
        aiBubble.className="bubble";
        aiBubble.innerText="I am listening… 🔹 (Admin will review reports)";
        messages.appendChild(aiBubble);
        messages.scrollTop = messages.scrollHeight;
    },500);
}
sendBtn.addEventListener("click", sendMessage);
input.addEventListener("keypress", e=>{ if(e.key==="Enter") sendMessage(); });

/* Report button */
reportBtn.addEventListener("click", ()=>{
    alert("Your message has been sent to the admin.");
});

</script>

</body>
</html>
