<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auris AI</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="auris-container">

    <!-- Logo -->
    <img src="logo.png" class="auris-logo">

    <!-- AI Orb -->
    <div id="auris-orb"></div>

    <!-- Chat Box -->
    <div class="chat-container">
        <div id="chat-log"></div>

        <div class="input-area">
            <input type="text" id="user-input" placeholder="Speak to Auris...">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

</div>

<script src="auris.js"></script>

</body>
</html>
